<svg xmlns="http://www.w3.org/2000/svg" width="600" height="1247" viewBox="0 0 600 1247" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a0a0d"/>
      <stop offset="0.5" stop-color="#7a1016"/>
      <stop offset="1" stop-color="#1a0405"/>
    </linearGradient>
    <linearGradient id="heroFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0b0b0b" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2b2f6b"/><stop offset="1" stop-color="#0e1030"/></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6b2b2b"/><stop offset="1" stop-color="#300e0e"/></linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2b5f4a"/><stop offset="1" stop-color="#0c221a"/></linearGradient>
    <linearGradient id="p4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5a4a1f"/><stop offset="1" stop-color="#241c08"/></linearGradient>
    <linearGradient id="p5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a2b6b"/><stop offset="1" stop-color="#1a0e30"/></linearGradient>
    <linearGradient id="p6" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1f4a5a"/><stop offset="1" stop-color="#081c24"/></linearGradient>
    <linearGradient id="p7" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6b3f2b"/><stop offset="1" stop-color="#301a0e"/></linearGradient>
    <linearGradient id="p8" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a3a3a"/><stop offset="1" stop-color="#161616"/></linearGradient>
  </defs>

  <!-- background -->
  <rect width="600" height="1247" fill="url(#bg)"/>

  <!-- status bar -->
  <text x="34" y="42" fill="#ffffff" font-size="24" font-weight="600">9:41</text>
  <g fill="#ffffff">
    <rect x="500" y="24" width="20" height="15" rx="2" opacity="0.9"/>
    <rect x="528" y="22" width="34" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <rect x="531" y="25" width="26" height="12" rx="2"/>
  </g>

  <!-- header: logo + profile -->
  <text x="30" y="108" fill="#E50914" font-size="46" font-weight="900" letter-spacing="2">MANZAR</text>
  <rect x="512" y="74" width="52" height="52" rx="10" fill="#E50914"/>
  <text x="538" y="110" fill="#ffffff" font-size="30" font-weight="800" text-anchor="middle">M</text>

  <!-- category pills -->
  <g font-size="22" font-weight="600">
    <rect x="30" y="140" width="92" height="42" rx="21" fill="#E50914"/>
    <text x="76" y="168" fill="#ffffff" text-anchor="middle">Movies</text>
    <rect x="134" y="140" width="86" height="42" rx="21" fill="none" stroke="#555" stroke-width="1.5"/>
    <text x="177" y="168" fill="#dddddd" text-anchor="middle">Shows</text>
    <rect x="232" y="140" width="130" height="42" rx="21" fill="none" stroke="#555" stroke-width="1.5"/>
    <text x="297" y="168" fill="#dddddd" text-anchor="middle">Categories</text>
  </g>

  <!-- featured hero -->
  <rect x="30" y="206" width="540" height="560" rx="20" fill="url(#hero)"/>
  <!-- faux film grain bars -->
  <g opacity="0.10" fill="#000000">
    <rect x="30" y="300" width="540" height="6"/>
    <rect x="30" y="420" width="540" height="6"/>
    <rect x="30" y="540" width="540" height="6"/>
  </g>
  <circle cx="300" cy="360" r="80" fill="#ffffff" opacity="0.06"/>
  <rect x="30" y="206" width="540" height="560" rx="20" fill="url(#heroFade)"/>

  <!-- MANZAR ORIGINAL tag -->
  <text x="58" y="470" fill="#E50914" font-size="20" font-weight="800" letter-spacing="4">M A N Z A R  &#8226;  O R I G I N A L</text>
  <!-- title -->
  <text x="55" y="560" fill="#ffffff" font-size="66" font-weight="900">MIDNIGHT</text>
  <text x="55" y="628" fill="#ffffff" font-size="66" font-weight="900">CITY</text>
  <!-- meta row -->
  <text x="58" y="672" fill="#cfcfcf" font-size="22" font-weight="500">2026  &#8226;  Thriller  &#8226;  Action  &#8226;  2h 08m</text>

  <!-- hero buttons -->
  <rect x="55" y="694" width="240" height="54" rx="8" fill="#ffffff"/>
  <path d="M100 708 L100 734 L124 721 Z" fill="#0b0b0b"/>
  <text x="200" y="729" fill="#0b0b0b" font-size="24" font-weight="800" text-anchor="middle">Play</text>
  <rect x="307" y="694" width="240" height="54" rx="8" fill="#333333" opacity="0.85"/>
  <text x="340" y="728" fill="#ffffff" font-size="34" font-weight="400">+</text>
  <text x="420" y="729" fill="#ffffff" font-size="22" font-weight="600" text-anchor="middle">My List</text>

  <!-- Row: Trending Now -->
  <text x="30" y="826" fill="#ffffff" font-size="28" font-weight="800">Trending Now</text>
  <g>
    <rect x="30"  y="846" width="150" height="210" rx="10" fill="url(#p1)"/>
    <rect x="196" y="846" width="150" height="210" rx="10" fill="url(#p2)"/>
    <rect x="362" y="846" width="150" height="210" rx="10" fill="url(#p3)"/>
    <rect x="528" y="846" width="150" height="210" rx="10" fill="url(#p4)"/>
    <!-- rank badges -->
    <text x="44"  y="1042" fill="#ffffff" font-size="26" font-weight="900" opacity="0.85">1</text>
    <text x="210" y="1042" fill="#ffffff" font-size="26" font-weight="900" opacity="0.85">2</text>
    <text x="376" y="1042" fill="#ffffff" font-size="26" font-weight="900" opacity="0.85">3</text>
  </g>

  <!-- Row: New Releases -->
  <text x="30" y="1108" fill="#ffffff" font-size="28" font-weight="800">New Releases</text>
  <g>
    <rect x="30"  y="1128" width="150" height="210" rx="10" fill="url(#p5)"/>
    <rect x="196" y="1128" width="150" height="210" rx="10" fill="url(#p6)"/>
    <rect x="362" y="1128" width="150" height="210" rx="10" fill="url(#p7)"/>
    <rect x="528" y="1128" width="150" height="210" rx="10" fill="url(#p8)"/>
  </g>

  <!-- bottom nav -->
  <rect x="0" y="1163" width="600" height="84" fill="#0a0a0a" opacity="0.96"/>
  <line x1="0" y1="1163" x2="600" y2="1163" stroke="#222" stroke-width="1"/>
  <g fill="#ffffff">
    <rect x="66" y="1188" width="30" height="24" rx="3"/>
    <text x="81" y="1236" font-size="16" text-anchor="middle" fill="#ffffff">Home</text>
  </g>
  <g fill="#777">
    <circle cx="228" cy="1198" r="12" fill="none" stroke="#777" stroke-width="3"/>
    <line x1="237" y1="1207" x2="245" y2="1215" stroke="#777" stroke-width="3"/>
    <text x="228" y="1236" font-size="16" text-anchor="middle" fill="#777">Search</text>
  </g>
  <g fill="#777">
    <rect x="360" y="1188" width="24" height="24" rx="4" fill="none" stroke="#777" stroke-width="3"/>
    <text x="372" y="1236" font-size="16" text-anchor="middle" fill="#777">New</text>
  </g>
  <g fill="#777">
    <path d="M512 1188 L512 1206 M504 1200 L512 1208 L520 1200" fill="none" stroke="#777" stroke-width="3"/>
    <text x="512" y="1236" font-size="16" text-anchor="middle" fill="#777">Downloads</text>
  </g>
</svg>
