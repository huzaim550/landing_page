<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0405"/>
      <stop offset="0.55" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="18%" r="60%">
      <stop offset="0" stop-color="#E50914" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#E50914" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a0a0d"/><stop offset="0.5" stop-color="#7a1016"/><stop offset="1" stop-color="#1a0405"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- left text block -->
  <text x="90" y="150" fill="#E50914" font-size="40" font-weight="900" letter-spacing="6">MANZAR</text>
  <text x="88" y="270" fill="#ffffff" font-size="82" font-weight="900">Unlimited movies,</text>
  <text x="88" y="360" fill="#ffffff" font-size="82" font-weight="900">right in your pocket.</text>
  <text x="90" y="430" fill="#b3b3b3" font-size="32" font-weight="500">Stream thousands of movies &amp; shows. Watch offline.</text>

  <!-- download pill -->
  <rect x="90" y="470" width="360" height="72" rx="10" fill="#E50914"/>
  <text x="270" y="518" fill="#ffffff" font-size="30" font-weight="800" text-anchor="middle">Download for Android</text>
  <text x="92" y="580" fill="#8a8a8a" font-size="24">Free &#8226; No account needed</text>

  <!-- right phone mock -->
  <g transform="translate(880,90)">
    <rect x="0" y="0" width="230" height="460" rx="34" fill="#0a0a0a" stroke="#333" stroke-width="4"/>
    <rect x="12" y="12" width="206" height="436" rx="24" fill="url(#phone)"/>
    <rect x="82" y="26" width="66" height="14" rx="7" fill="#0a0a0a"/>
    <text x="115" y="230" fill="#ffffff" font-size="26" font-weight="900" text-anchor="middle" opacity="0.9" letter-spacing="2">MANZAR</text>
    <rect x="34" y="300" width="70" height="24" rx="6" fill="#ffffff" opacity="0.85"/>
    <rect x="126" y="300" width="70" height="24" rx="6" fill="#444"/>
    <rect x="34" y="352" width="162" height="16" rx="4" fill="#ffffff" opacity="0.15"/>
    <rect x="34" y="382" width="120" height="16" rx="4" fill="#ffffff" opacity="0.12"/>
  </g>
</svg>
